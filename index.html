<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manuals Navigator</title>
    <style>
        /* Dark Theme Styling */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #e0e0e0; padding: 20px; line-height: 1.6; }
        .container { max-width: 900px; margin: 0 auto; background: #1e1e1e; padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); border: 1px solid #333; }
        h2 { border-bottom: 2px solid #007bff; padding-bottom: 10px; color: #fff; margin-top: 0; }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; color: #aaa; font-size: 0.85em; text-transform: uppercase; letter-spacing: 1px; }
        
        select { width: 100%; padding: 12px; background: #2d2d2d; color: white; border: 1px solid #444; border-radius: 6px; cursor: pointer; transition: border 0.3s; }
        select:focus { border-color: #007bff; outline: none; }
        select:disabled { opacity: 0.4; cursor: not-allowed; }

        .viewer-header { display: flex; justify-content: space-between; align-items: center; margin-top: 30px; padding: 10px; background: #252525; border-radius: 6px 6px 0 0; border: 1px solid #333; border-bottom: none; }
        #fileName { margin: 0; font-weight: bold; color: #007bff; }
        
        .btn { padding: 8px 16px; background: #007bff; color: white; text-decoration: none; border-radius: 4px; font-size: 0.9em; transition: background 0.2s; }
        .btn:hover { background: #0056b3; }

        #pdfFrame { width: 100%; height: 75vh; border: 1px solid #333; border-radius: 0 0 6px 6px; background: #333; }
        .placeholder { text-align: center; padding: 100px 20px; border: 2px dashed #333; border-radius: 8px; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h2>Manuals Library</h2>

    <div class="controls">
        <div>
            <label for="brand">Brand</label>
            <select id="brand">
                <option value="">-- Select Brand --</option>
            </select>
        </div>

        <div>
            <label for="model">Model</label>
            <select id="model" disabled>
                <option value="">-- Select Brand --</option>
            </select>
        </div>

        <div>
            <label for="file">Manual File</label>
            <select id="file" disabled>
                <option value="">-- Select Model --</option>
            </select>
        </div>
    </div>

    <div id="no-selection" class="placeholder">
        <p>Select a brand and model above to view the manual.</p>
    </div>

    <div id="viewer" style="display:none;">
        <div class="viewer-header">
            <p id="fileName"></p>
            <a href="#" id="fullTabBtn" class="btn" target="_blank">Open in New Tab</a>
        </div>
        <iframe id="pdfFrame" src=""></iframe>
    </div>
</div>

<script>
    // --- 1. SET YOUR GITHUB DETAILS HERE ---
    const GITHUB_USER = 'diablojsp'; 
    const GITHUB_REPO = 'Manual-archives'; 
    const BASE_PATH = 'manuals'; // The root folder for your manuals

    const brandSelect = document.getElementById('brand');
    const modelSelect = document.getElementById('model');
    const fileSelect = document.getElementById('file');
    const viewer = document.getElementById('viewer');
    const placeholder = document.getElementById('no-selection');
    const pdfFrame = document.getElementById('pdfFrame');
    const fullTabBtn = document.getElementById('fullTabBtn');
    const fileNameDisplay = document.getElementById('fileName');

    // Helper to fetch from GitHub API
    async function fetchGithub(path) {
        const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${path}`;
        const response = await fetch(url);
        if (!response.ok) return [];
        return await response.json();
    }

    // Load initial brands
    async function loadBrands() {
        const items = await fetchGithub(BASE_PATH);
        items.forEach(item => {
            if (item.type === 'dir') {
                brandSelect.add(new Option(item.name, item.path));
            }
        });
    }

    // Brand Change Logic
    brandSelect.addEventListener('change', async (e) => {
        modelSelect.innerHTML = '<option value="">-- Loading... --</option>';
        modelSelect.disabled = true;
        fileSelect.disabled = true;
        resetViewer();

        if (!e.target.value) {
            modelSelect.innerHTML = '<option value="">-- Select Brand --</option>';
            return;
        }

        const models = await fetchGithub(e.target.value);
        modelSelect.innerHTML = '<option value="">-- Select Model --</option>';
        models.forEach(item => {
            if (item.type === 'dir') {
                modelSelect.add(new Option(item.name, item.path));
            }
        });
        modelSelect.disabled = false;
    });

    // Model Change Logic
    modelSelect.addEventListener('change', async (e) => {
        fileSelect.innerHTML = '<option value="">-- Loading... --</option>';
        fileSelect.disabled = true;
        resetViewer();

        if (!e.target.value) {
            fileSelect.innerHTML = '<option value="">-- Select Model --</option>';
            return;
        }

        const files = await fetchGithub(e.target.value);
        fileSelect.innerHTML = '<option value="">-- Select File --</option>';
        files.forEach(item => {
            if (item.name.toLowerCase().endsWith('.pdf')) {
                fileSelect.add(new Option(item.name, item.download_url));
            }
        });
        fileSelect.disabled = false;
    });

    // File Selection Logic
    fileSelect.addEventListener('change', (e) => {
        if (!e.target.value) {
            resetViewer();
            return;
        }

        const url = e.target.value;
        const name = fileSelect.options[fileSelect.selectedIndex].text;

        // Display the PDF
        pdfFrame.src = url;
        fullTabBtn.href = url;
        fileNameDisplay.innerText = name;

        placeholder.style.display = 'none';
        viewer.style.display = 'block';
    });

    function resetViewer() {
        viewer.style.display = 'none';
        placeholder.style.display = 'block';
        pdfFrame.src = "";
    }

    // Start
    loadBrands();
</script>

</body>
</html>
