<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manuals Library</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Manuals Library</h1>
            <p class="subtitle">Browse manuals by Manufacturer → Make → Model</p>
        </header>

        <div class="breadcrumb" id="breadcrumb">
            <span class="breadcrumb-item active" data-level="root">Home</span>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search manufacturers, makes, or models...">
        </div>

        <div id="content" class="content">
            <!-- Dynamic content loads here -->
        </div>

        <div id="error" class="error" style="display: none;">
            <p>⚠️ Unable to load manuals index. Make sure <code>manuals/index.json</code> exists.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
